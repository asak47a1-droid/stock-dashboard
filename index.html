<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票看板</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111110; --bg2: #1a1a18; --bg3: #222220;
      --text: #f1efe8; --text2: #b4b2a9; --text3: #888780;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --radius-md: 8px; --radius-lg: 12px;
      --up: #e05252; --down: #3db87a;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      min-height: 100vh; padding: 1.5rem 1rem;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .header h1 { font-size: 18px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .header h1 i { font-size: 18px; color: var(--text2); }
    .update-info { font-size: 12px; color: var(--text3); }
    .refresh-btn {
      background: transparent; border: 0.5px solid var(--border2); color: var(--text2);
      border-radius: var(--radius-md); padding: 5px 12px; font-size: 12px;
      cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--bg3); }

    /* 漲跌排行 */
    .ranking-area {
      background: var(--bg2); border-radius: var(--radius-lg);
      padding: 14px 16px; margin-bottom: 1.25rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .ranking-col h3 { font-size: 12px; font-weight: 500; color: var(--text3); margin-bottom: 10px; letter-spacing: 0.05em; }
    .ranking-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 13px;
    }
    .ranking-item:last-child { border-bottom: none; }
    .ranking-name { color: var(--text2); }
    .ranking-pct { font-weight: 500; }

    .section-label {
      font-size: 11px; font-weight: 500; color: var(--text3);
      letter-spacing: 0.08em; text-transform: uppercase;
      margin-bottom: 8px; margin-top: 1.25rem;
    }
    .compare-hint {
      font-size: 12px; color: var(--text3); margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .compare-hint span { background: var(--bg3); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text2); }
    .cards {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px; margin-bottom: 4px;
    }
    .card {
      background: var(--bg2); border-radius: var(--radius-lg);
      padding: 12px 14px; cursor: pointer;
      border: 0.5px solid transparent; transition: border-color 0.15s; position: relative;
    }
    .card:hover { border-color: var(--border2); }
    .card.selected { border-color: #378add; }
    .card.comparing { border-color: var(--compare-color, #888); border-width: 1.5px; }
    .card-check {
      position: absolute; top: 8px; right: 8px;
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid var(--border2); background: transparent;
      display: flex; align-items: center; justify-content: center; font-size: 9px;
    }
    .card.comparing .card-check { background: var(--compare-color, #888); border-color: var(--compare-color, #888); color: #fff; }
    .card-symbol { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .card-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; }
    .card-price { font-size: 19px; font-weight: 500; margin-bottom: 4px; }
    .card-change { font-size: 12px; }
    .card-skeleton { opacity: 0.3; }
    .up { color: var(--up); } .down { color: var(--down); } .flat { color: var(--text2); }

    /* Chart */
    .chart-area { background: var(--bg2); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 1.25rem; }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .chart-title { font-size: 14px; font-weight: 500; }
    .chart-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .range-tabs { display: flex; gap: 4px; }
    .range-tab {
      padding: 4px 12px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border); background: transparent;
      font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s;
    }
    .range-tab:hover { background: var(--bg3); }
    .range-tab.active { background: var(--bg3); color: var(--text); border-color: var(--border2); }
    .mode-btn {
      padding: 4px 12px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border2); background: transparent;
      font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .mode-btn.active { background: #1e3a5f; color: #7bb8f0; border-color: #378add; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .chart-wrap { position: relative; width: 100%; height: 280px; }
    .chart-note { font-size: 11px; color: var(--text3); text-align: right; margin-top: 8px; }

    /* 新聞 */
    .news-area { background: var(--bg2); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 1.25rem; }
    .news-header { font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .news-list { display: flex; flex-direction: column; gap: 10px; }
    .news-item {
      padding: 10px 12px; background: var(--bg3); border-radius: var(--radius-md);
      cursor: pointer; transition: background 0.15s; text-decoration: none;
      display: block;
    }
    .news-item:hover { background: #2a2a28; }
    .news-title { font-size: 13px; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
    .news-meta { font-size: 11px; color: var(--text3); }
    .news-loading { font-size: 13px; color: var(--text3); text-align: center; padding: 1.5rem; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .card-price { font-size: 16px; }
      .ranking-area { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1><i class="ti ti-chart-line" aria-hidden="true"></i>股票看板</h1>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="update-info" id="lastUpdate">資料載入中...</span>
      <button class="refresh-btn" onclick="doRefresh()">
        <i class="ti ti-refresh" aria-hidden="true"></i> 更新
      </button>
    </div>
  </div>

  <!-- 漲跌排行 -->
  <div class="ranking-area">
    <div class="ranking-col">
      <h3>🔴 今日漲幅前三</h3>
      <div id="rank-up"><div class="news-loading">載入中...</div></div>
    </div>
    <div class="ranking-col">
      <h3>🟢 今日跌幅前三</h3>
      <div id="rank-down"><div class="news-loading">載入中...</div></div>
    </div>
  </div>

  <div class="compare-hint">
    <i class="ti ti-info-circle" style="font-size:13px"></i>
    點擊卡片可單獨查看；開啟比較模式後點選最多 5 支一起比較
    <span id="compareCount" style="display:none"></span>
  </div>

  <div class="section-label">🇹🇼 台股</div>
  <div class="cards" id="cards-tw"></div>

  <div class="section-label">🇺🇸 美股</div>
  <div class="cards" id="cards-us"></div>

  <div class="section-label">🇰🇷 韓股</div>
  <div class="cards" id="cards-kr"></div>

  <div class="section-label">📊 指數</div>
  <div class="cards" id="cards-index"></div>

  <div class="chart-area">
    <div class="chart-header">
      <span class="chart-title" id="chartTitle">歷史走勢</span>
      <div class="chart-controls">
        <button class="mode-btn" id="compareBtn" onclick="toggleCompareMode()">
          <i class="ti ti-git-compare" style="font-size:12px;vertical-align:-1px"></i> 比較模式
        </button>
        <div class="range-tabs" role="group">
          <button class="range-tab" onclick="setRange(this,'1d')">1D</button>
          <button class="range-tab active" onclick="setRange(this,'1mo')">1M</button>
          <button class="range-tab" onclick="setRange(this,'3mo')">3M</button>
          <button class="range-tab" onclick="setRange(this,'6mo')">6M</button>
          <button class="range-tab" onclick="setRange(this,'1y')">1Y</button>
          <button class="range-tab" onclick="setRange(this,'5y')">5Y</button>
        </div>
      </div>
    </div>
    <div class="legend" id="legend"></div>
    <div class="chart-wrap">
      <canvas id="lineChart" role="img" aria-label="歷史走勢折線圖"></canvas>
    </div>
    <p class="chart-note">資料來源：Yahoo Finance｜延遲約 15 分鐘</p>
  </div>

  <!-- 個股新聞 -->
  <div class="news-area">
    <div class="news-header">
      <i class="ti ti-news" style="font-size:15px;color:var(--text2)"></i>
      <span id="newsTitle">相關新聞</span>
    </div>
    <div class="news-list" id="newsList"><div class="news-loading">點擊股票卡片查看相關新聞</div></div>
  </div>

</div>

<script>
const COLORS = ['#e05252','#5b9cf6','#f6a94a','#a78df6','#3db87a','#f6e44a','#f67ab5','#4af6e4'];

const stockGroups = {
  tw: [
    { symbol: '2330.TW',   name: '台積電',        short: 'TSMC'   },
    { symbol: '0050.TW',   name: '元大台灣50',     short: '0050'   },
    { symbol: '00878.TW',  name: '國泰永續高股息', short: '00878'  },
    { symbol: '00692.TW',  name: '富邦公司治理',   short: '00692'  },
    { symbol: '006208.TW', name: '富邦台50',       short: '006208' },
  ],
  us: [
    { symbol: 'SPY',  name: 'S&P 500 ETF',  short: 'SPY'  },
    { symbol: 'QQQ',  name: '那斯達克 ETF', short: 'QQQ'  },
    { symbol: 'NVDA', name: '輝達',          short: 'NVDA' },
    { symbol: 'AAPL', name: '蘋果',          short: 'AAPL' },
    { symbol: 'TSLA', name: '特斯拉',        short: 'TSLA' },
    { symbol: 'MU',   name: '美光',          short: 'MU'   },
  ],
  kr: [
    { symbol: '000660.KS', name: 'SK海力士', short: 'SK하이닉스' },
    { symbol: '005930.KS', name: '三星電子',  short: '삼성전자'   },
  ],
  index: [
    { symbol: '^TWII', name: '台灣加權指數', short: 'TWII'   },
    { symbol: '^GSPC', name: 'S&P 500',      short: 'S&P500' },
    { symbol: '^IXIC', name: '那斯達克',     short: 'NASDAQ' },
    { symbol: '^DJI',  name: '道瓊指數',     short: 'DOW'    },
  ],
};

const allStocks = [
  ...stockGroups.tw.map(s=>({...s,group:'tw'})),
  ...stockGroups.us.map(s=>({...s,group:'us'})),
  ...stockGroups.kr.map(s=>({...s,group:'kr'})),
  ...stockGroups.index.map(s=>({...s,group:'index'})),
];

const PROXY = '/api/';
let selectedIdx = 0;
let currentRange = '1mo';
let lineChart = null;
let priceData = {};
let compareMode = false;
let compareSet = [];

function cc(v){ return v>0?'up':v<0?'down':'flat'; }
function ar(v){ return v>0?'▲':v<0?'▼':'—'; }
function fmt(n,d=2){ return n!=null?n.toFixed(d):'—'; }

/* ── 漲跌排行 ── */
function renderRanking() {
  const all = allStocks
    .filter(s => priceData[s.symbol])
    .map(s => ({ name: s.name, pct: priceData[s.symbol].pct }))
    .sort((a,b) => b.pct - a.pct);

  const top3 = all.slice(0, 3);
  const bot3 = all.slice(-3).reverse();

  document.getElementById('rank-up').innerHTML = top3.map(s => `
    <div class="ranking-item">
      <span class="ranking-name">${s.name}</span>
      <span class="ranking-pct up">▲ ${s.pct.toFixed(2)}%</span>
    </div>`).join('') || '<div class="news-loading">載入中...</div>';

  document.getElementById('rank-down').innerHTML = bot3.map(s => `
    <div class="ranking-item">
      <span class="ranking-name">${s.name}</span>
      <span class="ranking-pct down">▼ ${Math.abs(s.pct).toFixed(2)}%</span>
    </div>`).join('') || '<div class="news-loading">載入中...</div>';
}

/* ── cards ── */
function renderGroup(key) {
  const el = document.getElementById(`cards-${key}`);
  if (!el) return;
  el.innerHTML = stockGroups[key].map(s => {
    const idx = allStocks.findIndex(a=>a.symbol===s.symbol);
    const d = priceData[s.symbol];
    const price = d?fmt(d.price):'—';
    const chg   = d?(d.change>=0?'+':'')+fmt(d.change):'—';
    const pct   = d?(d.pct>=0?'+':'')+fmt(d.pct)+'%':'';
    const cls   = d?cc(d.change):'flat card-skeleton';
    const cmpIdx = compareSet.indexOf(idx);
    const isCmp = cmpIdx !== -1;
    const color = isCmp ? COLORS[cmpIdx] : '';
    const isSel = !compareMode && selectedIdx===idx;
    return `
      <div class="card ${isSel?'selected':''} ${isCmp?'comparing':''}"
           style="${isCmp?`--compare-color:${color}`:''}"
           onclick="cardClick(${idx})" ondblclick="cardDblClick(${idx})"
           role="button" tabindex="0">
        <div class="card-check">${isCmp?'✓':''}</div>
        <div class="card-symbol">${s.short}</div>
        <div class="card-name">${s.name}</div>
        <div class="card-price ${cls}">${price}</div>
        <div class="card-change ${cls}">${ar(d?.change)} ${chg} ${pct}</div>
      </div>`;
  }).join('');
}

function renderCards() {
  ['tw','us','kr','index'].forEach(renderGroup);
  const cnt = document.getElementById('compareCount');
  if (compareMode && compareSet.length > 0) {
    cnt.style.display='inline';
    cnt.textContent = `已選 ${compareSet.length}/5`;
  } else { cnt.style.display='none'; }
}

/* ── 個股新聞 ── */
async function fetchNews(symbol, name) {
  document.getElementById('newsTitle').textContent = `${name} 相關新聞`;
  document.getElementById('newsList').innerHTML = '<div class="news-loading">載入新聞中...</div>';
  try {
    const ticker = symbol.replace('.TW','').replace('.KS','');
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
    const newsUrl = `https://query2.finance.yahoo.com/v1/finance/search?q=${ticker}&lang=zh-TW&region=TW&quotesCount=0&newsCount=5`;
    const r = await fetch(PROXY + newsUrl.replace('https://query2.finance.yahoo.com/','').replace('https://query1.finance.yahoo.com/',''));
    const j = await r.json();
    const news = j.news ?? [];
    if (!news.length) {
      document.getElementById('newsList').innerHTML = '<div class="news-loading">目前無相關新聞</div>';
      return;
    }
    document.getElementById('newsList').innerHTML = news.map(n => {
      const date = new Date(n.providerPublishTime * 1000);
      const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
      return `
        <a class="news-item" href="${n.link}" target="_blank" rel="noopener">
          <div class="news-title">${n.title}</div>
          <div class="news-meta">${n.publisher} · ${dateStr}</div>
        </a>`;
    }).join('');
  } catch {
    document.getElementById('newsList').innerHTML = '<div class="news-loading">新聞載入失敗</div>';
  }
}

/* ── click ── */
function cardClick(idx) {
  if (compareMode) { toggleCompare(idx); }
  else {
    selectedIdx = idx;
    renderCards();
    loadChart();
    const s = allStocks[idx];
    fetchNews(s.symbol, s.name);
  }
}

function cardDblClick(idx) {
  if (!compareMode) {
    compareMode = true;
    document.getElementById('compareBtn').classList.add('active');
    compareSet = [selectedIdx];
  }
  toggleCompare(idx);
}

function toggleCompare(idx) {
  const pos = compareSet.indexOf(idx);
  if (pos !== -1) { compareSet.splice(pos, 1); }
  else { if (compareSet.length >= 5) return; compareSet.push(idx); }
  renderCards(); loadChart();
}

function toggleCompareMode() {
  compareMode = !compareMode;
  document.getElementById('compareBtn').classList.toggle('active', compareMode);
  if (!compareMode) { compareSet = []; }
  else { compareSet = [selectedIdx]; }
  renderCards(); loadChart();
}

/* ── fetch ── */
async function fetchPrice(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
  try {
    const r = await fetch(PROXY + url.replace('https://query1.finance.yahoo.com/',''));
    const j = await r.json();
    const meta = j.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose ?? meta.previousClose ?? price;
    const change = price - prev;
    const pct = prev?(change/prev)*100:0;
    return { price, change, pct };
  } catch { return null; }
}

async function fetchHistory(symbol, range) {
  const iv = {'1d':'5m','1mo':'1d','3mo':'1d','6mo':'1wk','1y':'1wk','5y':'1mo'}[range]??'1d';
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=${iv}&range=${range}`;
  try {
    const r = await fetch(PROXY + url.replace('https://query1.finance.yahoo.com/',''));
    const j = await r.json();
    const res = j.chart.result[0];
    const stamps = res.timestamp;
    const closes = res.indicators.quote[0].close;
    const labels = stamps.map(t => {
      const d = new Date(t*1000);
      if (range==='1d') return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
      if (range==='5y') return `${d.getFullYear()}/${d.getMonth()+1}`;
      return `${d.getMonth()+1}/${d.getDate()}`;
    });
    return { labels, data: closes.map(v=>v!=null?+v.toFixed(2):null) };
  } catch { return null; }
}

function pctChange(data) {
  const first = data.find(v=>v!=null);
  if (!first) return data;
  return data.map(v=>v!=null?+((v-first)/first*100).toFixed(3):null);
}

/* ── chart ── */
function renderSingle(labels, data, name) {
  const valid = data.filter(Boolean);
  const first = valid[0]??0, last = valid[valid.length-1]??0;
  const isUp = last>=first;
  if (lineChart) { lineChart.destroy(); lineChart=null; }
  document.getElementById('legend').innerHTML='';
  lineChart = new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{ labels, datasets:[{ label:name, data, borderColor:isUp?'#e05252':'#3db87a', backgroundColor:isUp?'rgba(224,82,82,0.12)':'rgba(61,184,122,0.12)', borderWidth:2, pointRadius:0, pointHoverRadius:4, fill:true, tension:0.3, spanGaps:true }] },
    options: chartOptions(false)
  });
}

function renderMulti(datasets) {
  if (lineChart) { lineChart.destroy(); lineChart=null; }
  document.getElementById('legend').innerHTML = datasets.map(d=>`
    <div class="legend-item"><div class="legend-dot" style="background:${d.color}"></div>${d.name}</div>`).join('');
  lineChart = new Chart(document.getElementById('lineChart'), {
    type:'line',
    data:{ labels: datasets[0].labels, datasets: datasets.map(d=>({ label:d.name, data:d.pctData, borderColor:d.color, backgroundColor:'transparent', borderWidth:2, pointRadius:0, pointHoverRadius:4, fill:false, tension:0.3, spanGaps:true })) },
    options: chartOptions(true)
  });
}

function chartOptions(isCompare) {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{ backgroundColor:'#222220', titleColor:'#b4b2a9', bodyColor:'#f1efe8', borderColor:'#333', borderWidth:0.5,
        callbacks:{ label: c => isCompare ? ` ${c.dataset.label}: ${c.parsed.y>=0?'+':''}${c.parsed.y?.toFixed(2)}%` : ` ${c.parsed.y?.toFixed(2)??'—'}` }
      }
    },
    scales:{
      x:{ ticks:{color:'#888780',font:{size:11},maxTicksLimit:8,autoSkip:true}, grid:{color:'rgba(255,255,255,0.05)'} },
      y:{ ticks:{color:'#888780',font:{size:11}, callback: v=>isCompare?(v>=0?'+':'')+v.toFixed(1)+'%':v}, grid:{color:'rgba(255,255,255,0.05)'}, position:'right' }
    }
  };
}

async function loadChart() {
  if (compareMode && compareSet.length > 1) {
    document.getElementById('chartTitle').textContent = '走勢比較（%變化）';
    const results = await Promise.all(compareSet.map(async (idx,ci) => {
      const s = allStocks[idx];
      const hist = await fetchHistory(s.symbol, currentRange);
      if (!hist) return null;
      return { name:s.name, color:COLORS[ci], labels:hist.labels, pctData:pctChange(hist.data) };
    }));
    const valid = results.filter(Boolean);
    if (valid.length) renderMulti(valid);
  } else {
    const idx = compareMode && compareSet.length===1 ? compareSet[0] : selectedIdx;
    const s = allStocks[idx];
    document.getElementById('chartTitle').textContent = `${s.name} 歷史走勢`;
    const hist = await fetchHistory(s.symbol, currentRange);
    if (hist) renderSingle(hist.labels, hist.data, s.name);
  }
}

function setRange(el, range) {
  currentRange = range;
  document.querySelectorAll('.range-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadChart();
}

async function doRefresh() {
  renderCards();
  await Promise.all(allStocks.map(async s=>{
    const d = await fetchPrice(s.symbol);
    if (d) priceData[s.symbol]=d;
  }));
  renderCards();
  renderRanking();
  const now = new Date();
  document.getElementById('lastUpdate').textContent =
    `更新：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  await loadChart();
}

doRefresh();
setInterval(doRefresh, 30000);

// 預設載入台積電新聞
fetchNews('2330.TW', '台積電');
</script>
</body>
